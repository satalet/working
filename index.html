<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسجّل الساعات التفاعلي | abu shalbak</title>
    <!-- رابط الـ Manifest لتعريف التطبيق للجوال -->
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind CSS لجمالية التصميم والتجاوب مع الجوال -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center p-4">

    <!-- الرأس (Header) -->
    <header class="w-full max-w-md text-center my-6">
        <h1 class="text-2xl font-bold text-sky-400">Future Sat 🛠️</h1>
        <p class="text-slate-400 text-sm">نظام تسجيل الساعات الذكي لأبو باسم</p>
    </header>

    <!-- بطاقة التحكم الرئيسية -->
    <main class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 space-y-6">
        
        <!-- عرض تاريخ اليوم واليوم الحالي تلقائياً -->
        <div class="bg-slate-900 rounded-xl p-4 text-center border border-slate-700">
            <div id="current-day-name" class="text-xl font-bold text-emerald-400">---</div>
            <div id="current-date" class="text-sm text-slate-400 mt-1">---</div>
        </div>

        <!-- خانات إدخال الوقت -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1">⏰ ساعة الدخول:</label>
                <div class="flex gap-2">
                    <input type="time" id="entry-time" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500">
                    <button onclick="setCurrentTime('entry-time')" class="bg-sky-600 hover:bg-sky-500 text-xs px-3 rounded-lg text-white font-semibold">الآن</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1">⏰ ساعة الخروج:</label>
                <div class="flex gap-2">
                    <input type="time" id="exit-time" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500">
                    <button onclick="setCurrentTime('exit-time')" class="bg-sky-600 hover:bg-sky-500 text-xs px-3 rounded-lg text-white font-semibold">الآن</button>
                </div>
            </div>
        </div>

        <!-- أزرار الإجراءات السريعة -->
        <div class="grid grid-cols-2 gap-3 pt-2">
            <button id="btn-save" onclick="submitWorkDay()" class="col-span-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200">
                💾 حفظ يوم عمل
            </button>
            <button id="btn-off" onclick="submitOffDay()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2.5 rounded-lg transition">
                🌴 تسجيل عطلة
            </button>
            <button id="btn-friday" onclick="submitFridayOff()" class="bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-lg transition">
                🕌 عطلة الجمعة
            </button>
        </div>

    </main>

    <!-- جدول عرض السجل (تفاعلي) -->
    <section class="w-full max-w-md mt-8 space-y-4">
        <div class="flex justify-between items-center px-1">
            <h2 class="text-lg font-bold text-sky-400">📋 السجل الحالي (15 يوم)</h2>
            <span id="days-count" class="bg-slate-800 border border-slate-700 text-xs text-slate-300 px-2.5 py-1 rounded-full">0 / 15 يوم</span>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg">
            <table class="w-full text-sm text-right">
                <thead class="bg-slate-900 text-slate-300 text-xs uppercase border-b border-slate-700">
                    <tr>
                        <th class="p-3 text-center">اليوم</th>
                        <th class="p-3 text-center">التاريخ</th>
                        <th class="p-3 text-center">ساعات العمل</th>
                        <th class="p-3 text-center">الخصم</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body" class="divide-y divide-slate-700 text-slate-300">
                    <!-- البيانات بتنزل هون ديناميكياً -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- كود التشغيل والمنطق التفاعلي والربط السحابي -->
    <script>
        // رابط الـ SheetDB الخاص بك يا أبو باسم
        const SHEETDB_URL = "https://sheetdb.io/api/v1/053k5ng1d1rqw"; 

        const arabicDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

        window.onload = function() {
            const today = new Date();
            document.getElementById('current-day-name').innerText = arabicDays[today.getDay()];
            document.getElementById('current-date').innerText = today.toISOString().split('T')[0];
            document.getElementById('entry-time').value = "07:00";
            document.getElementById('exit-time').value = "18:30";
        };

        function setCurrentTime(id) {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById(id).value = `${hours}:${minutes}`;
        }

        // دالة لتعديل أو إضافة السطر بالجدول المحلي التفاعلي
        function updateLocalTable(day, date, hoursStr, discountStr) {
            const tbody = document.getElementById('logs-table-body');
            const rows = tbody.getElementsByTagName('tr');
            let existingRow = null;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                if (cells.length > 1 && cells[1].innerText.trim() === date) {
                    existingRow = rows[i];
                    break;
                }
            }

            let hoursColor = "text-emerald-400";
            if (hoursStr.includes("عطلة")) {
                hoursColor = "text-amber-400";
            }

            const rowContent = `
                <td class="p-3 text-center font-semibold text-slate-200">${day}</td>
                <td class="p-3 text-center text-xs text-slate-400">${date}</td>
                <td class="p-3 text-center ${hoursColor}">${hoursStr}</td>
                <td class="p-3 text-center text-rose-400">${discountStr}</td>
            `;

            if (existingRow) {
                existingRow.innerHTML = rowContent;
            } else {
                const newRow = document.createElement('tr');
                newRow.className = "hover:bg-slate-700/50 transition";
                newRow.innerHTML = rowContent;
                tbody.appendChild(newRow);
            }

            const uniqueDays = tbody.getElementsByTagName('tr').length;
            document.getElementById('days-count').innerText = `${uniqueDays} / 15 يوم`;
        }

        // فحص التكرار وإعطاء خيار التعديل قبل الإرسال
        function checkDuplicateAndConfirm(dateStr, dayName) {
            const tbody = document.getElementById('logs-table-body');
            const rows = tbody.getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                if (cells.length > 1 && cells[1].innerText.trim() === dateStr) {
                    return confirm(`⚠️ تنبيه: بيانات يوم (${dayName} - ${dateStr}) مسجلة مسبقاً!\n\nهل تريد إعادة تسجيل وتعديل بيانات هذا اليوم في جوجل شيت؟`);
                }
            }
            return true;
        }

        // دالة لإرسال البيانات إلى جوجل شيت عبر SheetDB
        async function sendDataToGoogle(payload) {
            const btnSave = document.getElementById('btn-save');
            const originalText = btnSave.innerText;
            btnSave.innerText = "⏳ جاري الحفظ سحابياً...";
            btnSave.disabled = true;

            // تنسيق البيانات للأعمدة في شيت جوجل الخاص بك
            const formattedData = {
                data: [
                    {
                        "اليوم": payload.day,
                        "التاريخ": payload.date,
                        "ساعة الدخول": payload.entry,
                        "ساعة الخروج": payload.exit,
                        "ساعات العمل الفعلية": payload.actualHours,
                        "الخصم (ساعة)": payload.discount
                    }
                ]
            };

            try {
                const response = await fetch(SHEETDB_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(formattedData)
                });
                
                if (response.ok) {
                    updateLocalTable(payload.day, payload.date, payload.actualHours === 0 ? payload.entry : `${payload.actualHours} س`, payload.discount === 0 ? "0.00 س" : `${payload.discount} س`);
                    alert("✅ تم الحفظ في Google Sheets بنجاح يا أبو باسم وبدون أي حظر حماية!");
                } else {
                    throw new Error("فشل الحفظ في جوجل شيت");
                }
            } catch (error) {
                console.error("Error sending data:", error);
                alert("❌ حدث خطأ أثناء الحفظ، تفقد اتصالك بالإنترنت!");
            } finally {
                btnSave.innerText = originalText;
                btnSave.disabled = false;
            }
        }

        function submitWorkDay() {
            const today = new Date();
            const dayName = arabicDays[today.getDay()];
            const dateStr = today.toISOString().split('T')[0];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const entryVal = document.getElementById('entry-time').value;
            const exitVal = document.getElementById('exit-time').value;

            if(!entryVal || !exitVal) {
                alert("الرجاء تحديد أوقات الدخول والخروج أولاً!");
                return;
            }

            const [entryH, entryM] = entryVal.split(':').map(Number);
            const [exitH, exitM] = exitVal.split(':').map(Number);
            
            let diffMs = ((exitH * 60 + exitM) - (entryH * 60 + entryM)) * 60000;
            if(diffMs < 0) diffMs += 24 * 60 * 60 * 1000; 

            const actualHours = (diffMs / 3600000).toFixed(2);
            const requiredHours = 12.0;
            const discount = actualHours < requiredHours ? (requiredHours - actualHours).toFixed(2) : "0.00";

            const payload = {
                day: dayName,
                date: dateStr,
                entry: formatAMPM(entryH, entryM),
                exit: formatAMPM(exitH, exitM),
                actualHours: actualHours,
                discount: discount
            };

            sendDataToGoogle(payload);
        }

        function submitOffDay() {
            const today = new Date();
            const dayName = arabicDays[today.getDay()];
            const dateStr = today.toISOString().split('T')[0];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const payload = {
                day: dayName,
                date: dateStr,
                entry: "عطلة",
                exit: "عطلة",
                actualHours: 0,
                discount: 0
            };
            sendDataToGoogle(payload);
        }

        function submitFridayOff() {
            const today = new Date();
            const dayName = arabicDays[today.getDay()];
            const dateStr = today.toISOString().split('T')[0];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const payload = {
                day: dayName,
                date: dateStr,
                entry: "عطلة الجمعة",
                exit: "عطلة الجمعة",
                actualHours: 0,
                discount: 0
            };
            sendDataToGoogle(payload);
        }

        function formatAMPM(hours, minutes) {
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const minutesStr = String(minutes).padStart(2, '0');
            const hoursStr = String(hours).padStart(2, '0');
            return `${hoursStr}:${minutesStr} ${ampm}`;
        }

        // سكريبت تفعيل الـ Service Worker عشان يدعم التثبيت كتطبيق
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered Successfully!'))
                .catch((err) => console.log('Service Worker Registration Failed!', err));
        }
    </script>
</body>
</html>
