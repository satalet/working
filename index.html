<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسجّل الساعات التفاعلي | مخبز أبو شلبك</title>
    <!-- رابط الـ Manifest لتعريف التطبيق للجوال -->
    <link class="main-manifest" rel="manifest" href="manifest.json">
    <!-- Tailwind CSS لجمالية التصميم والتجاوب مع الجوال -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center p-4">

    <!-- الرأس (Header) -->
    <header class="w-full max-w-md text-center my-6">
        <h1 class="text-2xl font-bold text-sky-400">مخبز أبو شلبك 🥖</h1>
        <p class="text-slate-400 text-sm">نظام تسجيل الساعات الذكي لأبو باسم</p>
    </header>

    <!-- بطاقة التحكم الرئيسية -->
    <main class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 space-y-6">
        
        <!-- اختيار التاريخ يدوياً وتلقائياً -->
        <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 text-center space-y-2">
            <div id="current-day-name" class="text-xl font-bold text-emerald-400">---</div>
            <div class="flex flex-col items-center justify-center">
                <label class="text-xs text-slate-400 mb-1">📅 تاريخ يوم العمل:</label>
                <input type="date" id="work-date" onchange="updateDayName()" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-white text-center focus:outline-none focus:border-sky-500 text-sm">
            </div>
        </div>

        <!-- خانات إدخال الوقت -->
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1">⏰ ساعة الدخول:</label>
                <div class="flex gap-2">
                    <input type="time" id="entry-time" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500">
                    <button onclick="setCurrentTime('entry-time')" class="bg-sky-600 hover:bg-sky-500 text-xs px-3 rounded-lg text-white font-semibold">الآن</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1">⏰ ساعة الخروج:</label>
                <div class="flex gap-2">
                    <input type="time" id="exit-time" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-sky-500">
                    <button onclick="setCurrentTime('exit-time')" class="bg-sky-600 hover:bg-sky-500 text-xs px-3 rounded-lg text-white font-semibold">الآن</button>
                </div>
            </div>
        </div>

        <!-- أزرار الإجراءات السريعة -->
        <div class="grid grid-cols-2 gap-3 pt-2">
            <button id="btn-save" onclick="submitWorkDay()" class="col-span-2 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200">
                💾 حفظ يوم عمل
            </button>
            <button id="btn-off" onclick="submitOffDay()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2.5 rounded-lg transition">
                🌴 تسجيل عطلة
            </button>
            <button id="btn-friday" onclick="submitFridayOff()" class="bg-amber-600 hover:bg-amber-500 text-white font-semibold py-2.5 rounded-lg transition">
                🕌 عطلة الجمعة
            </button>
        </div>

    </main>

    <!-- جدول عرض السجل (تفاعلي متصل سحابياً) -->
    <section class="w-full max-w-md mt-8 space-y-4">
        <div class="flex justify-between items-center px-1">
            <h2 class="text-lg font-bold text-sky-400">📋 السجل الحالي من السحاب</h2>
            <span id="days-count" class="bg-slate-800 border border-slate-700 text-xs text-slate-300 px-2.5 py-1 rounded-full">⏳ جاري التحميل...</span>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg">
            <table class="w-full text-sm text-right">
                <thead class="bg-slate-900 text-slate-300 text-xs uppercase border-b border-slate-700">
                    <tr>
                        <th class="p-3 text-center">اليوم</th>
                        <th class="p-3 text-center">التاريخ</th>
                        <th class="p-3 text-center">ساعات العمل</th>
                        <th class="p-3 text-center">الخصم</th>
                    </tr>
                </thead>
                <tbody id="logs-table-body" class="divide-y divide-slate-700 text-slate-300">
                    <tr>
                        <td colspan="4" class="p-6 text-center text-slate-500">جاري جلب البيانات من Google Sheets...</td>
                    </tr>
                </tbody>
                <!-- السطر الإجمالي لحساب مجموع الخصومات -->
                <tfoot class="bg-slate-900/80 border-t border-slate-700 font-bold text-slate-200">
                    <tr>
                        <td colspan="3" class="p-3 text-left pl-6 text-slate-400 font-medium">مجموع ساعات الخصم الحالية:</td>
                        <td id="total-discount" class="p-3 text-center text-rose-400 text-base">0.00 س</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </section>

    <!-- كود التشغيل والمنطق التفاعلي والربط السحابي -->
    <script>
        // رابط الـ SheetDB الخاص بك يا أبو باسم
        const SHEETDB_URL = "https://sheetdb.io/api/v1/053k5ng1d1rqw"; 

        const arabicDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

        window.onload = function() {
            const localToday = new Date();
            const offset = localToday.getTimezoneOffset();
            const adjustedDate = new Date(localToday.getTime() - (offset * 60 * 1000));
            const formattedDate = adjustedDate.toISOString().split('T')[0];

            document.getElementById('work-date').value = formattedDate;
            
            updateDayName();

            document.getElementById('entry-time').value = "07:00";
            document.getElementById('exit-time').value = "18:30";
            
            fetchDataFromGoogle();
        };

        function updateDayName() {
            const dateVal = document.getElementById('work-date').value;
            if (dateVal) {
                const selectedDate = new Date(dateVal);
                document.getElementById('current-day-name').innerText = arabicDays[selectedDate.getDay()];
            }
        }

        function setCurrentTime(id) {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById(id).value = `${hours}:${minutes}`;
        }

        // دالة مخصصة لجمع خانات الخصم تلقائياً من الجدول
        function calculateTotalDiscount() {
            const tbody = document.getElementById('logs-table-body');
            const rows = tbody.getElementsByTagName('tr');
            let total = 0;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                if (cells.length > 3) {
                    const discountText = cells[3].innerText.replace('س', '').trim();
                    const discountVal = parseFloat(discountText);
                    if (!isNaN(discountVal)) {
                        total += discountVal;
                    }
                }
            }
            document.getElementById('total-discount').innerText = `${total.toFixed(2)} س`;
        }

        async function fetchDataFromGoogle() {
            try {
                const response = await fetch(SHEETDB_URL);
                if (!response.ok) throw new Error("فشل جلب البيانات");
                const data = await response.json();
                
                const tbody = document.getElementById('logs-table-body');
                tbody.innerHTML = ""; 

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-500">لا يوجد بيانات مسجلة بعد.</td></tr>`;
                    document.getElementById('days-count').innerText = "0 يوم";
                    document.getElementById('total-discount').innerText = "0.00 س";
                    return;
                }

                const uniqueRecordsMap = new Map();
                data.forEach(record => {
                    const date = record["التاريخ"];
                    if (date) {
                        uniqueRecordsMap.set(date, record); 
                    }
                });

                const uniqueRecordsList = Array.from(uniqueRecordsMap.values()).slice(-15);

                uniqueRecordsList.forEach(record => {
                    const day = record["اليوم"] || "---";
                    const date = record["التاريخ"] || "---";
                    let entry = record["ساعة الدخول"] || "---";
                    let actualHours = record["ساعات العمل الفعلية"] || "0";
                    const discount = record["الخصم (ساعة)"] || "0";

                    let hoursStr = "";
                    let hoursColor = "text-emerald-400";

                    if (entry.includes("عطلة")) {
                        hoursStr = entry;
                        hoursColor = "text-amber-400";
                    } else {
                        hoursStr = `${parseFloat(actualHours).toFixed(2)} س`;
                    }

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-700/50 transition";
                    row.innerHTML = `
                        <td class="p-3 text-center font-semibold text-slate-200">${day}</td>
                        <td class="p-3 text-center text-xs text-slate-400">${date}</td>
                        <td class="p-3 text-center ${hoursColor}">${hoursStr}</td>
                        <td class="p-3 text-center text-rose-400">${parseFloat(discount).toFixed(2)} س</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('days-count').innerText = `${uniqueRecordsList.length} يوم فريد`;
                
                // حساب المجموع بعد الانتهاء من رص السطور
                calculateTotalDiscount();

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('logs-table-body').innerHTML = `<tr><td colspan="4" class="p-6 text-center text-rose-400">❌ فشل تحميل البيانات السحابية!</td></tr>`;
                document.getElementById('days-count').innerText = "خطأ بالاتصال";
            }
        }

        function updateLocalTable(day, date, hoursStr, discountStr) {
            const tbody = document.getElementById('logs-table-body');
            const rows = tbody.getElementsByTagName('tr');
            let existingRow = null;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                if (cells.length > 1 && cells[1].innerText.trim() === date) {
                    existingRow = rows[i];
                    break;
                }
            }

            let hoursColor = "text-emerald-400";
            if (hoursStr.includes("عطلة")) {
                hoursColor = "text-amber-400";
            }

            const rowContent = `
                <td class="p-3 text-center font-semibold text-slate-200">${day}</td>
                <td class="p-3 text-center text-xs text-slate-400">${date}</td>
                <td class="p-3 text-center ${hoursColor}">${hoursStr}</td>
                <td class="p-3 text-center text-rose-400">${discountStr}</td>
            `;

            if (existingRow) {
                existingRow.innerHTML = rowContent;
            } else {
                if (tbody.rows.length === 1 && (tbody.rows[0].cells.length === 1 || tbody.rows[0].cells[0].innerText.includes("لا يوجد"))) {
                    tbody.innerHTML = "";
                }
                const newRow = document.createElement('tr');
                newRow.className = "hover:bg-slate-700/50 transition";
                newRow.innerHTML = rowContent;
                tbody.insertBefore(newRow, tbody.firstChild); 
            }

            const uniqueDays = tbody.getElementsByTagName('tr').length;
            document.getElementById('days-count').innerText = `${uniqueDays} يوم فريد`;
            
            // إعادة الحساب فوراً لتحديث المجموع بالواجهة
            calculateTotalDiscount();
        }

        function checkDuplicateAndConfirm(dateStr, dayName) {
            const tbody = document.getElementById('logs-table-body');
            const rows = tbody.getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                if (cells.length > 1 && cells[1].innerText.trim() === dateStr) {
                    return confirm(`⚠️ تنبيه: بيانات يوم (${dayName} - ${dateStr}) مسجلة مسبقاً!\n\nهل تريد إعادة تسجيل وتعديل بيانات هذا اليوم في جوجل شيت؟`);
                }
            }
            return true;
        }

        async function sendDataToGoogle(payload) {
            const btnSave = document.getElementById('btn-save');
            const originalText = btnSave.innerText;
            btnSave.innerText = "⏳ جاري الحفظ سحابياً...";
            btnSave.disabled = true;

            const formattedData = {
                data: [
                    {
                        "اليوم": payload.day,
                        "التاريخ": payload.date,
                        "ساعة الدخول": payload.entry,
                        "ساعة الخروج": payload.exit,
                        "ساعات العمل الفعلية": payload.actualHours,
                        "الخصم (ساعة)": payload.discount
                    }
                ]
            };

            try {
                const checkResponse = await fetch(`${SHEETDB_URL}/search?التاريخ=${payload.date}`);
                const existingData = await checkResponse.json();

                let response;
                if (existingData && existingData.length > 0) {
                    response = await fetch(`${SHEETDB_URL}/التاريخ/${payload.date}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(formattedData)
                    });
                } else {
                    response = await fetch(SHEETDB_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(formattedData)
                    });
                }
                
                if (response.ok) {
                    updateLocalTable(payload.day, payload.date, payload.actualHours === 0 ? payload.entry : `${payload.actualHours} س`, payload.discount === 0 ? "0.00 س" : `${payload.discount} س`);
                    alert("✅ تم الحفظ والتحديث بنجاح يا أبو باسم!");
                } else {
                    throw new Error("فشل الحفظ");
                }
            } catch (error) {
                console.error("Error sending data:", error);
                alert("❌ حدث خطأ أثناء الحفظ!");
            } finally {
                btnSave.innerText = originalText;
                btnSave.disabled = false;
            }
        }

        function submitWorkDay() {
            const dateStr = document.getElementById('work-date').value;
            if(!dateStr) return;
            const selectedDate = new Date(dateStr);
            const dayName = arabicDays[selectedDate.getDay()];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const entryVal = document.getElementById('entry-time').value;
            const exitVal = document.getElementById('exit-time').value;

            if(!entryVal || !exitVal) {
                alert("الرجاء تحديد أوقات الدخول والخروج أولاً!");
                return;
            }

            const [entryH, entryM] = entryVal.split(':').map(Number);
            const [exitH, exitM] = exitVal.split(':').map(Number);
            
            let diffMs = ((exitH * 60 + exitM) - (entryH * 60 + entryM)) * 60000;
            if(diffMs < 0) diffMs += 24 * 60 * 60 * 1000; 

            const actualHours = (diffMs / 3600000).toFixed(2);
            const requiredHours = 12.0;
            const discount = actualHours < requiredHours ? (requiredHours - actualHours).toFixed(2) : "0.00";

            const payload = {
                day: dayName,
                date: dateStr,
                entry: formatAMPM(entryH, entryM),
                exit: formatAMPM(exitH, exitM),
                actualHours: actualHours,
                discount: discount
            };

            sendDataToGoogle(payload);
        }

        function submitOffDay() {
            const dateStr = document.getElementById('work-date').value;
            if(!dateStr) return;
            const selectedDate = new Date(dateStr);
            const dayName = arabicDays[selectedDate.getDay()];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const payload = {
                day: dayName,
                date: dateStr,
                entry: "عطلة",
                exit: "عطلة",
                actualHours: 0,
                discount: 0
            };
            sendDataToGoogle(payload);
        }

        function submitFridayOff() {
            const dateStr = document.getElementById('work-date').value;
            if(!dateStr) return;
            const selectedDate = new Date(dateStr);
            const dayName = arabicDays[selectedDate.getDay()];
            
            if (!checkDuplicateAndConfirm(dateStr, dayName)) return;

            const payload = {
                day: dayName,
                date: dateStr,
                entry: "عطلة الجمعة",
                exit: "عطلة الجمعة",
                actualHours: 0,
                discount: 0
            };
            sendDataToGoogle(payload);
        }

        function formatAMPM(hours, minutes) {
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const minutesStr = String(minutes).padStart(2, '0');
            const hoursStr = String(hours).padStart(2, '0');
            return `${hoursStr}:${minutesStr} ${ampm}`;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered Successfully!'))
                .catch((err) => console.log('Service Worker Registration Failed!', err));
        }
    </script>
</body>
</html>
